career-profile:
    title: Career Profile
    summary: |
      Advanced analytics leader with 15+ years bridging academia and industry. I align data-driven
      initiatives with business objectives, guide cross-functional teams toward operational excellence,
      and scale solutions from pilot to enterprise adoption.

      I design and deploy analytical and digital solutions that advance key operational KPIs, enhance
      reliability and safety, and accelerate insight generation. My work spans mining, manufacturing,
      and services—delivering throughput and recovery gains in processing plants, boosting industrial
      productivity, reducing critical environmental alerts, and compressing field-data workflows
      (GPR, hyperspectral, magnetometry) from days to hours.

