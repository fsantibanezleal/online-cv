    time: 2003 - 2009
    details: |
      Bachelor of Science in Electrical, Electronics and Communications Engineering.

  - degree: Instrumental Electronic Technician
    university: "CEAT Liceo Mauricio Hochschild"
    time: 1999 - 2002
    details: |
      Technical training in instrumental electronics.

experiences:
  title: Experiences
  info:
  - role: I&F Decision Science Assoc. Manager
    time: Sep 2025 - Present
    company: Accenture, Santiago, Chile
    details: |
      Guide the strategic and ethical application of insights derived from data.
      Architect and deliver solutions using Data & AI strategies, open-source modules
      or industry/function specific technologies, platforms, or software.
        - Support sales of industry/function focused Data & AI projects
        - Develop models and algorithms using deep decision science and industry/function orientation to solve business problems

  - role: Senior Data Science Lead | Technical & Project Lead @ MinCo-Hidro CODELCO
    time: Sep 2025 - Present
    company: Accenture (Client Assignment), Santiago, Chile
    details: |
      On client assignment at Codelco's Advanced Analytics Directorate (MinCo-Hidro)
      under the Technology & Digitalization Management (GTD).
        - Lead end-to-end data science initiatives for mining process optimization
        - Deliver secure, scalable, production-grade solutions tying business value to governance and engineering best practices
        - Architecture & solution design: modeling strategy, feature engineering, batch/streaming pipelines, APIs/microservices
        - MLOps & production: CI/CD, model registry, monitoring/observability, A/B testing, safe rollback

  - role: Data Processing Specialist | Senior Lead Data Scientist | Project Leader
    time: Jan 2025 - Sep 2025
    company: Minera Centinela, Antofagasta, Chile
    details: |
      Led the development and implementation of an advanced analytics system for SAG mill operations.
        - Delivered a recommender system generating actionable operational strategies every four hours
        - Predictive modeling of ore properties, real-time material tracking across stockpiles
        - Scenario-based optimization resulting in measurable uplift in throughput and recovery efficiency

  - role: Business & Technology Delivery Associate Manager | Project Leader in Advanced Analytics
    time: Jun 2024 - Jan 2025
    company: Accenture, Santiago, Chile
    details: |
      Led advanced analytics and machine learning projects for large national mining companies.
        - Development of predictive and prescriptive models for flotation, grinding, and thickening optimization
        - Managed geophysical risk analysis projects, integrating radar and geological datasets
        - Coordinated cross-functional teams and stakeholders to align analytical solutions with business objectives

  - role: Independent Consultant | Advanced Analytics & Software Development
    time: May 2024 - Jun 2024
    company: Consulting Services / Freelance, Santiago, Chile
    details: |
      Consulting and software development in industrial process optimization.
        - Implemented a clay classification system using hyperspectral imagery from aerial sampling
        - Designed a crusher lining characterization system using point cloud measurement analysis

  - role: Project Leader | Senior Data Scientist
    time: Jan 2022 - May 2024
    company: CODELCO, Santiago, Chile
    details: |
      Led advanced analytics and machine learning initiatives (Azure Databricks, Azure Data Factory, Power BI, Kedro).
        - Recommendation system for flotation and milling processes
        - Ore grade and metallurgical property tracking from extraction to plant
        - Predictive models for environmental pollution (PM10) correlated with mining activity
        - Built rapid analysis prototypes and intermediate solutions in Streamlit

  - role: Head of Analytics and Development Teams | Project Leader
    time: Aug 2021 - Dec 2021
    company: Alaya, Santiago, Chile
    details: |
      Directed cross-functional teams delivering consulting and software development projects.
        - Optimization and monitoring solutions for mining, aquaculture, food processing, and manufacturing
        - Computer vision-based monitoring system for salmon industry operations

  - role: Principal Applied Scientific Researcher | Postdoctoral Research
    time: Aug 2019 - Oct 2021
    company: ALGES - AMTC, Universidad de Chile
    details: |
      Applied scientific research in machine learning classification and mathematical modelling
      of multidimensional data, hyper-spectral images, data fusion and super-resolution.

  - role: Expert ML/IA - Applied Scientific Researcher
    time: Aug 2017 - Jul 2021
    company: ALGES, Universidad de Chile
    details: |
      Integration of non-parametric Bayesian strategies and high dimensional hyperspectral data
      for characterization of uncertainty and real-time estimation of geometallurgical variables.

  - role: Teacher
    time: Jul 2017 - Jul 2021
    company: Universidad San Sebastian, Santiago, Chile
    details: |
      Microscopy, Optics, and Image Processing courses. Medical Informatics / Informatics Pathology.
        - Development of practicals for scientific software, image processing and mathematical analysis
        - FIJI and ImageJ tools

  - role: Principal Hardware and Software Engineer
    time: Jan 2017 - Aug 2021
    company: MicroMundo, Santiago, Chile
    details: |
      Developed new educational methodologies based on school scientific research.
      Integrated low cost microscopy, image processing and virtual microscopy for educational content.

  - role: Freelancer Software & Web Developer
    time: Jan 2016 - Nov 2021
    company: Santiago de Chile
    details: |
      Consulting services in big data, analytics, high dimensional information and data science.
      Implementation of Machine learning, Deep learning, and Optimization solutions based on Python,
      Kedro, and cloud services (Azure and AWS).

  - role: Researcher PhD Candidate
    time: Jan 2016 - Dec 2017
    company: Universidad de Chile
    details: |
      Research on inverse problems in signal processing and stochastic modeling. Optimal Well Placement
      problem, compressed sensing, and adaptive sampling strategies for geological image recovery.

  - role: Software Development for Scientific Computing
    time: Jul 2011 - Mar 2016
    company: BNI - SCIAN-Lab, Universidad de Chile
    details: |
      Image Processing Software Development for Scientific Computing on Microscopy with Biomedical Applications.
      Development of Super-resolution microscopy techniques (SOFI). Extension of Millennium Scientific Initiative work.

  - role: Research Assistant & Support Electronic Engineer
    time: Sep 2010 - Jun 2011
    company: NEMO - Universidad de Chile
    details: |
      Development and support for modeling, parallelization and optimization of algorithms
      for developmental biology and applied sciences at SCIAN-Lab.

  - role: Researcher - Software Engineer
    time: Apr 2010 - Nov 2010
    company: CEFOP, Universidad de Concepcion
    details: |
      Development Platform for Micro and Nano Optics Handling interactive in Real-time
      using optical tweezers and spatial light modulator (SLM).

  - role: Development Engineer - Researcher
    time: Jan 2009 - Jul 2010
    company: Faculty of Engineering, Universidad de Concepcion
    details: |
      Arthroscopic Training System Based On Interactive Visualization and Haptic Devices.
      Implementation of collision detection, soft tissue deformation and haptic force feedback.

