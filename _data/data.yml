projects:
    title: Projects
    intro: >
      Selected projects spanning research, industry, and education.

    assignments:
      - title: Crusher Liner Wear Management System
        link:
        tagline: "Full-stack platform for 3D point cloud analysis, cylindrical wear profiling, and remaining-life forecasting of industrial crusher liners."

      - title: Hyperspectral Mineral Classification Platform
        link:
        tagline: "ML platform for mineral identification from VNIR/SWIR imagery using ensemble methods, CNNs, and compositional constraints."

      - title: Mining Process Optimization Platform
        link:
        tagline: "End-to-end ML platform for SAG milling, flotation, and thickening optimization across multiple mining divisions."

      - title: Real-Time Material Tracking & Blending
        link:
        tagline: "Digital twin for ore flow tracking, stockpile management, and blending optimization in mining operations."

      - title: Environmental Monitoring & Mitigation
        link:
        tagline: "Computer vision (24-stream) and Generative AI for pollution detection, forecasting, and natural-language recommendations."

      - title: Geotechnical Risk Prediction
        link:
        tagline: "ML-based prediction of rockburst and slope instability using seismic data, spatial features, and 3D block models."

      - title: HIDSAG
        link: "https://doi.org/10.1038/s41597-023-02061-x"
        tagline: "Hyperspectral Image Database for Supervised Analysis in Geometallurgy. Published in Scientific Data (Nature)."

      - title: Cellular Potts Model Simulator
        link: "https://github.com/fsantibanezleal/SCIAN_LEO_CPM"
        tagline: "Interactive CPM simulator for zebrafish embryonic cell migration with deformable bodies and filopodia-driven motility."

      - title: 3D Embryo Cell Migration Simulator
        link: "https://github.com/fsantibanezleal/SCIAN_EVL_SpherSIM"
        tagline: "3D simulation of collective cell migration on a spherical zebrafish embryo surface using Three.js and FastAPI."

      - title: SOFI Super-Resolution Microscopy
        link: "https://github.com/fsantibanezleal/FASL_SOFI_QDOTS"
        tagline: "Quantum dot fluorescence analysis via higher-order cumulants, achieving sub-diffraction resolution (up to 2.45x improvement)."

      - title: Optimal Spatial Sampling (AdSEMES)
        link: "https://github.com/fsantibanezleal/IDS_OWP"
        tagline: "Information-theoretic framework for optimal well placement using adaptive entropy maximization with (1-1/e) guarantee."

      - title: 3D Haptic Simulation
        link: "https://github.com/fsantibanezleal/UDEC_Haptic_SIM"
        tagline: "Octree collision detection and spring-damper force feedback for virtual object interaction via Three.js and WebSocket."

      - title: Dynamic Holographic Optical Tweezers
        link: "https://github.com/fsantibanezleal/CEFOP_DinHot"
        tagline: "Real-time holographic phase mask computation for optical particle trapping using the Gerchberg-Saxton algorithm."

      - title: Dual Photography Lab
        link: "https://github.com/fsantibanezleal/FASL_Coding_DualFotography"
        tagline: "Computational imaging reconstructing scenes from the projector's viewpoint via light transport matrices and SVD."

      - title: Robotic Writer
        link: "https://github.com/fsantibanezleal/Udec_Robotic_Writer"
        tagline: "5-DOF robotic arm simulation for letter placement using Denavit-Hartenberg kinematics and trajectory planning."

      - title: MicroMundo
        link: "https://micromundo.app/"
        tagline: "Virtual microscopy educational platform for science outreach in optics and technology."

      - title: FeelIT
        link:
        tagline: "Haptic and VR interactive platform for visually impaired users — exploring tactile feedback for virtual objects."

      - title: HyClusVi
        link:
        tagline: "Hyperspectral clustering and visualization for mineral analysis using convolutional autoencoders and t-SNE."

