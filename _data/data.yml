career-profile:
  title: Career Profile
  summary: |
    Advanced Analytics & Project Management leader with a proven track record of integrating
    data-driven solutions into mission-critical operations. Skilled at aligning business goals
    with technical innovation, leading cross-functional teams, and delivering measurable improvements
    across the value chain.

    Experienced in the design and deployment of predictive models, optimization systems, and digital
    platforms that consistently drive operational KPIs, enhance decision-making, and embed a culture
    of continuous improvement. Recognized for fostering operational excellence, bridging technical and
    business domains, and achieving sustainable impact across mining, industrial, and service sectors.

    Key accomplishments include: fleet optimization reducing unplanned stoppages; concentrator
    initiatives increasing SAG milling throughput and flotation recovery; advanced analytics projects
    improving production by 10-15%; and engineering workflows for GPR, hyperspectral, and magnetometry
    data collection accelerated from days to hours.

education:
  title: Education
  info:
  - degree: Doctor in Electrical Engineering
    university: Universidad de Chile
    time: 2013 - 2019
    details: |
      Thesis: "An information-theoretic sampling strategy for the recovery of geological images:
      modeling, analysis, and implementation." Research on inverse problems at low-rate sampling
      with focus in Geosciences, optimal well placement, compressed sensing, and adaptive sampling.

  - degree: Postgraduate Diploma in Medical Informatics
    university: Universidad de Chile & University of Heidelberg
    time: 2011
    details: |
      "Health Information Systems: Social and technical requirements for successful design and deployment."

  - degree: Electronic Civil Engineering (Ingeniero Civil Electronico)
